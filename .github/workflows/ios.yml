name: Build iOS IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run:
          npm install
      - name: Sync Capacitor
        run:
          npx cap sync ios
      - name: Install CocoaPods
        run:
          |
          cd ios/App
          pod install
      - name: Build Archive
        run:
          |
          cd ios/App
          xcodebuild \
          -workspace App.xcworkspace \
          -scheme App \
          -configuration Release \
          archive \
          -archivePath build/App.xcarchive