name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v5


      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10


      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm


      - name: Install
        run: pnpm install


      - name: Capacitor sync
        run: pnpm exec cap sync ios