name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:

      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v5


      # 安装 Node
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm


      # 安装依赖
      - name: Install dependencies
        run: npm install


      # 检查 Capacitor 环境
      - name: Capacitor doctor
        run: npx cap doctor


      # 同步 iOS 工程
      - name: Capacitor sync ios
        run: npx cap sync ios


      # 查看 iOS 工程结构
      - name: Check iOS project
        run: |
          ls -la ios
          ls -la ios/App


      # 编译 iOS Archive
      - name: Build iOS Archive
        run: |
          cd ios/App

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive